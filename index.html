<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EMS Director">
<title>EMS Medical Director Time Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a2332; min-height: 100vh; }
header { background: #1a3a5c; color: white; padding: 16px 20px; }
header h1 { font-size: 1.05rem; font-weight: 700; }
header p { font-size: 0.75rem; opacity: 0.7; margin-top: 2px; }
.tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; overflow-x: auto; }
.tab { padding: 14px 18px; cursor: pointer; font-size: 0.85rem; font-weight: 500; border-bottom: 3px solid transparent; margin-bottom: -2px; color: #64748b; white-space: nowrap; transition: all 0.2s; }
.tab.active { color: #1a3a5c; border-bottom-color: #1a3a5c; }
.content { padding: 16px; max-width: 900px; margin: 0 auto; }
.card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
label { display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
input, select, textarea { width: 100%; padding: 11px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; color: #1a2332; background: #fff; -webkit-appearance: none; appearance: none; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #1a3a5c; }
textarea { resize: vertical; min-height: 80px; font-size: 0.9rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-group { margin-bottom: 14px; }
.btn { padding: 12px 20px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; -webkit-appearance: none; }
.btn-primary { background: #1a3a5c; color: white; width: 100%; }
.btn-primary:active { background: #0f2640; }
.btn-danger { background: #fee2e2; color: #dc2626; font-size: 0.75rem; padding: 6px 10px; }
.btn-export { background: #0f766e; color: white; flex: 1; }
.btn-pdf { background: #1e40af; color: white; flex: 1; }
.export-row { display: flex; gap: 10px; margin-top: 4px; }
.progress-bar { height: 14px; background: #e2e8f0; border-radius: 99px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
.progress-fill.ok { background: #16a34a; }
.progress-fill.warn { background: #ea580c; }
.progress-fill.over { background: #dc2626; }
.progress-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: #64748b; }
.month-select-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 14px; flex-wrap: wrap; }
.month-select-row > div:first-child { flex: 1; min-width: 160px; }
.entry-list { display: flex; flex-direction: column; gap: 8px; }
.entry-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; }
.entry-dot { width: 8px; height: 8px; border-radius: 50%; background: #1a3a5c; margin-top: 5px; flex-shrink: 0; }
.entry-body { flex: 1; min-width: 0; }
.entry-top { display: flex; justify-content: space-between; gap: 8px; }
.entry-cat { font-size: 0.82rem; font-weight: 600; color: #1a3a5c; }
.entry-hrs { font-size: 0.82rem; font-weight: 700; color: #0f766e; white-space: nowrap; }
.entry-date { font-size: 0.73rem; color: #94a3b8; margin-top: 2px; }
.entry-notes { font-size: 0.77rem; color: #64748b; margin-top: 3px; line-height: 1.4; }
.empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 0.9rem; }
.report-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 14px; }
.report-table th { background: #1a3a5c; color: white; padding: 8px 10px; text-align: left; font-weight: 600; }
.report-table th:last-child { text-align: right; white-space: nowrap; }
.report-table td { padding: 6px 10px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
.report-table tr.group-row td { font-weight: 700; background: #f1f5f9; color: #1a3a5c; }
.report-table tr.sub-row td:first-child { padding-left: 20px; color: #475569; }
.report-table tr.total-row td { font-weight: 700; background: #1a3a5c; color: white; }
.report-table td:last-child { text-align: right; white-space: nowrap; }
.notes-section { margin: 14px 0; padding: 12px 14px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
.notes-section h4 { font-size: 0.73rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #475569; margin-bottom: 8px; }
.note-item { font-size: 0.79rem; color: #334155; margin-bottom: 5px; padding-left: 10px; border-left: 2px solid #cbd5e1; line-height: 1.4; }
.sig-block { margin-top: 24px; padding-top: 14px; border-top: 2px solid #1a3a5c; font-size: 0.79rem; color: #334155; }
.sig-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; margin-top: 18px; }
.sig-line { border-top: 1px solid #64748b; padding-top: 4px; color: #64748b; font-size: 0.73rem; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.status-bar { background: #fef9c3; border: 1px solid #fde047; border-radius: 8px; padding: 10px 14px; font-size: 0.8rem; color: #713f12; margin-bottom: 14px; display: none; }
.status-bar.show { display: block; }
.status-bar.error { background: #fee2e2; border-color: #fca5a5; color: #7f1d1d; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #16a34a; color: white; padding: 12px 22px; border-radius: 10px; font-size: 0.875rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }
@media (max-width: 480px) {
  .form-row { grid-template-columns: 1fr; }
  .sig-grid { grid-template-columns: 1fr; gap: 20px; }
  .export-row { flex-direction: column; }
}
</style>
</head>
<body>

<header>
  <h1>🚑 Union EMS — Time Tracker</h1>
  <p>Matthew Bidwell, MD, MPH · Medical Director</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('log')">📋 Log Time</div>
  <div class="tab" onclick="showTab('entries')">📂 Entries</div>
  <div class="tab" onclick="showTab('report')">📊 Report</div>
</div>

<div class="content">

  <!-- LOG TAB -->
  <div id="tab-log">
    <div id="sync-status" class="status-bar"></div>
    <div class="card">
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label>Date</label>
          <input type="date" id="log-date">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>Hours</label>
          <select id="log-hours"></select>
        </div>
      </div>
      <div class="form-group" style="margin-top:14px">
        <label>Category (Schedule B-1)</label>
        <select id="log-category"></select>
      </div>
      <div class="form-group">
        <label>Notes / Activity Description</label>
        <textarea id="log-notes" placeholder="Describe specific activities, locations, incidents reviewed, training topics, etc."></textarea>
      </div>
      <button class="btn btn-primary" id="log-btn" onclick="logEntry()">+ Log Entry</button>
    </div>
    <div class="card">
      <label style="margin-bottom:10px">This Month's Progress (Target: 40 hrs)</label>
      <div id="month-progress"><div class="progress-bar"><div class="progress-fill ok" style="width:0%"></div></div><div class="progress-meta"><span>Loading…</span></div></div>
    </div>
  </div>

  <!-- ENTRIES TAB -->
  <div id="tab-entries" style="display:none">
    <div class="card">
      <div class="month-select-row">
        <div>
          <label>View Month</label>
          <select id="entries-month" onchange="renderEntries()"></select>
        </div>
      </div>
      <div id="entries-list"><div class="empty-state">Loading…</div></div>
    </div>
  </div>

  <!-- REPORT TAB -->
  <div id="tab-report" style="display:none">
    <div class="card">
      <div class="month-select-row">
        <div>
          <label>Report Month</label>
          <select id="report-month" onchange="renderReport()"></select>
        </div>
      </div>
      <div class="export-row">
        <button class="btn btn-pdf" onclick="printReport()">🖨 Print / PDF</button>
        <button class="btn btn-export" onclick="exportWord()">📄 Export Word</button>
      </div>
      <div id="report-content" style="margin-top:16px"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx3m457-kAq0aM_FN4pZ1SuN8jOSdZuaqFGYK4OwcSs1Kf8HzK9Otzt9to_g_yknsbK/exec";

// ── SCHEDULE B-1 ──────────────────────────────────────────────────────────
const SCHEDULE = [
  { num:"1", group:"1. Provide medical direction for EMD and Communications (general)", subs:[
    "1a. Medical Priority Reference System oversight and review",
    "1b. Dispatch QA, QI",
    "1c. Dispatch Steering Committee participation"] },
  { num:"2", group:"2. Provide County First Responder Program oversight and review", subs:[] },
  { num:"3", group:"3. Provide medical direction for Union EMS (general)", subs:[
    "3a. Establish, approve, update treatment protocols",
    "3b. Medical supervision of selection, orientation, continuing education, performance of Union EMS personnel",
    "3c. Conduct scope of practice performance evaluations",
    "3d. Perform medical review of care provided to patients; QA, QI activities"] },
  { num:"4", group:"4. Chair EMS Quality Management and Peer Review committees", subs:[] },
  { num:"5", group:"5. Establish, maintain procedures for Union EMS personnel to obtain online medical control", subs:[] },
  { num:"6", group:"6. Union EMS public relations/marketing activities", subs:[] },
  { num:"7", group:"7. Participate on Union EMS committees; represent Union EMS on medical staff, hospital committees", subs:[] },
  { num:"8", group:"8. Make Union EMS rounds; Union EMS office/admin time", subs:[] },
  { num:"9", group:"9. Assist with problem solving, complaint resolution", subs:[] },
  { num:"10", group:"10. Provide in-service, continuing education to Union EMS staff", subs:[] },
  { num:"11", group:"11. Ride time with Union EMS personnel on ambulances, QRVs", subs:[] },
  { num:"12", group:"12. Attend local, state, national meetings, seminars related to EMS", subs:[] },
  { num:"13", group:"13. Additional responsibilities of the Medical Director (to the extent not addressed above)", subs:[
    "13a. Providing medical direction and clinical supervision",
    "13b. Developing, reviewing and updating Medical Protocols and Procedures",
    "13c. Collaborating with Union County to review Communications Center procedures",
    "13d. Performing audits of clinical care and Services including Communications Center procedures",
    "13e. Attending relevant Continuing Medical Education programs",
    "13f. Providing education programs to enhance skills of paramedics and other clinicians",
    "13g. Advising Union EMS on selection of equipment, supplies and pharmaceuticals",
    "13h. Conducting periodic reviews and evaluations of Clinical Quality Indicators",
    "13i. Assisting Union EMS leadership with patient complaints and regulatory compliance",
    "13j. Meeting periodically with Union EMS leadership to evaluate clinical care and Services"] },
];

const ALL_CATS = [];
SCHEDULE.forEach(s => {
  if (s.subs.length) s.subs.forEach(sub => ALL_CATS.push({ group: s.group, label: sub }));
  else ALL_CATS.push({ group: s.group, label: s.group });
});

// ── HOURS DROPDOWN ────────────────────────────────────────────────────────
const hoursEl = document.getElementById('log-hours');
for (let h = 0.25; h <= 12; h = Math.round((h + 0.25) * 100) / 100) {
  const o = document.createElement('option');
  o.value = h;
  o.textContent = h % 1 === 0 ? `${h}.0 hrs` : `${h} hrs`;
  hoursEl.appendChild(o);
}
hoursEl.value = 1;

// ── CATEGORY DROPDOWN ─────────────────────────────────────────────────────
const catEl = document.getElementById('log-category');
SCHEDULE.forEach(s => {
  if (s.subs.length) {
    const og = document.createElement('optgroup'); og.label = s.group;
    s.subs.forEach(sub => { const o = document.createElement('option'); o.value = sub; o.textContent = sub; og.appendChild(o); });
    catEl.appendChild(og);
  } else {
    const o = document.createElement('option'); o.value = s.group; o.textContent = s.group; catEl.appendChild(o);
  }
});

document.getElementById('log-date').value = new Date().toISOString().slice(0, 10);

// ── CACHE ─────────────────────────────────────────────────────────────────
let _cache = null;
let _loading = false;

async function fetchEntries(force = false) {
  if (_cache && !force) return _cache;
  if (_loading) { await new Promise(r => setTimeout(r, 300)); return _cache || []; }
  _loading = true;
  try {
    const r = await fetch(`${API}?action=getAll`);
    const d = await r.json();
    _cache = (d.entries || []).map(e => ({ ...e, hours: parseFloat(e.hours) }));
    _loading = false;
    return _cache;
  } catch (err) {
    _loading = false;
    showStatus('Could not reach Google Sheets. Check your connection.', true);
    return _cache || [];
  }
}

async function apiPost(payload) {
  const r = await fetch(API + '?action=add', { method: 'POST', body: JSON.stringify(payload) });
  return r.json();
}

async function apiDelete(id) {
  const r = await fetch(`${API}?action=delete&id=${id}`);
  return r.json();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
const mk = d => String(d).slice(0, 7);
const mlabel = k => { const [y,m] = k.split('-'); return new Date(y, m-1, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' }); };
function months(entries) {
  const s = new Set(entries.map(e => mk(e.date)));
  s.add(mk(new Date().toISOString()));
  return [...s].sort().reverse();
}
function fmtDate(d) {
  return new Date(String(d) + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}
function showStatus(msg, err = false) {
  const el = document.getElementById('sync-status');
  el.textContent = msg; el.className = 'status-bar show' + (err ? ' error' : '');
  if (!err) setTimeout(() => el.classList.remove('show'), 3000);
}

// ── LOG ENTRY ─────────────────────────────────────────────────────────────
async function logEntry() {
  const date = document.getElementById('log-date').value;
  const hours = parseFloat(document.getElementById('log-hours').value);
  const category = document.getElementById('log-category').value;
  const notes = document.getElementById('log-notes').value.trim();
  if (!date || !category) { toast('Please fill date and category.', '#dc2626'); return; }

  const btn = document.getElementById('log-btn');
  btn.innerHTML = '<span class="spinner"></span> Saving…'; btn.disabled = true;

  const entry = { id: Date.now(), date, hours, category, notes };
  try {
    await apiPost(entry);
    _cache = null; // invalidate cache
    document.getElementById('log-notes').value = '';
    toast('✓ Entry saved to Google Sheets!');
    await renderProgress();
  } catch (e) {
    showStatus('Save failed. Check your connection and try again.', true);
  }
  btn.innerHTML = '+ Log Entry'; btn.disabled = false;
}

// ── PROGRESS ──────────────────────────────────────────────────────────────
async function renderProgress() {
  const entries = await fetchEntries();
  const cur = mk(new Date().toISOString());
  const total = entries.filter(e => mk(e.date) === cur).reduce((s, e) => s + e.hours, 0);
  const pct = Math.min((total / 40) * 100, 100);
  const cls = total >= 40 ? 'over' : total >= 28 ? 'warn' : 'ok';
  document.getElementById('month-progress').innerHTML = `
    <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>
    <div class="progress-meta"><span>${total.toFixed(2)} / 40.00 hrs this month</span><span>${pct.toFixed(0)}%</span></div>`;
}

// ── ENTRIES TAB ───────────────────────────────────────────────────────────
async function renderEntries() {
  document.getElementById('entries-list').innerHTML = '<div class="empty-state">Loading…</div>';
  const entries = await fetchEntries();
  const ms = months(entries);
  const sel = document.getElementById('entries-month');
  const cur = sel.value && ms.includes(sel.value) ? sel.value : ms[0];
  sel.innerHTML = ms.map(m => `<option value="${m}"${m===cur?' selected':''}>${mlabel(m)}</option>`).join('');
  const filt = entries.filter(e => mk(e.date) === cur).sort((a,b) => String(b.date).localeCompare(String(a.date)));
  const list = document.getElementById('entries-list');
  if (!filt.length) { list.innerHTML = '<div class="empty-state">No entries for this month.</div>'; return; }
  const totalH = filt.reduce((s,e) => s + e.hours, 0);
  list.innerHTML = `<div style="font-size:0.78rem;color:#64748b;margin-bottom:10px">${filt.length} entries · <strong>${totalH.toFixed(2)} hrs total</strong></div>
  <div class="entry-list">${filt.map(e => `
    <div class="entry-item">
      <div class="entry-dot"></div>
      <div class="entry-body">
        <div class="entry-top"><span class="entry-cat">${e.category}</span><span class="entry-hrs">${e.hours} hrs</span></div>
        <div class="entry-date">${fmtDate(e.date)}</div>
        ${e.notes ? `<div class="entry-notes">${e.notes}</div>` : ''}
      </div>
      <button class="btn btn-danger" onclick="deleteEntry('${e.id}')">✕</button>
    </div>`).join('')}</div>`;
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  try {
    await apiDelete(id);
    _cache = null;
    toast('Entry deleted.', '#dc2626');
    renderEntries();
    renderProgress();
  } catch(e) { toast('Delete failed. Try again.', '#dc2626'); }
}

// ── REPORT DATA ───────────────────────────────────────────────────────────
async function getReportData(monthKey) {
  const entries = await fetchEntries();
  const filt = entries.filter(e => mk(e.date) === monthKey);
  const hrs = {};
  ALL_CATS.forEach(c => hrs[c.label] = 0);
  filt.forEach(e => { if (hrs[e.category] !== undefined) hrs[e.category] += e.hours; });
  const totalHrs = filt.reduce((s,e) => s + e.hours, 0);
  const withNotes = filt.filter(e => e.notes).sort((a,b) => String(a.date).localeCompare(String(b.date)));
  return { hrs, totalHrs, withNotes };
}

// ── REPORT TAB ────────────────────────────────────────────────────────────
async function renderReport() {
  document.getElementById('report-content').innerHTML = '<div class="empty-state">Loading…</div>';
  const entries = await fetchEntries();
  const ms = months(entries);
  const sel = document.getElementById('report-month');
  const cur = sel.value && ms.includes(sel.value) ? sel.value : ms[0];
  sel.innerHTML = ms.map(m => `<option value="${m}"${m===cur?' selected':''}>${mlabel(m)}</option>`).join('');
  const { hrs, totalHrs, withNotes } = await getReportData(cur);
  document.getElementById('report-content').innerHTML = buildReportHTML(cur, hrs, totalHrs, withNotes);
}

function buildReportHTML(monthKey, hrs, totalHrs, withNotes) {
  const mfull = mlabel(monthKey);
  const rows = SCHEDULE.map(s => {
    if (s.subs.length) {
      const gTotal = s.subs.reduce((sum, sub) => sum + (hrs[sub] || 0), 0);
      return `<tr class="group-row"><td>${s.group}</td><td>${gTotal > 0 ? gTotal.toFixed(2) : '—'}</td></tr>`
        + s.subs.map(sub => `<tr class="sub-row"><td>${sub}</td><td>${(hrs[sub]||0) > 0 ? (hrs[sub]).toFixed(2) : '—'}</td></tr>`).join('');
    }
    return `<tr class="group-row"><td>${s.group}</td><td>${(hrs[s.group]||0) > 0 ? (hrs[s.group]).toFixed(2) : '—'}</td></tr>`;
  }).join('');

  const notesHTML = withNotes.length ? `
    <div class="notes-section"><h4>Activity Notes</h4>
      ${withNotes.map(e => `<div class="note-item"><strong>${new Date(String(e.date)+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})} — ${e.category}:</strong> ${e.notes}</div>`).join('')}
    </div>` : '';

  return `
    <div style="margin-bottom:14px">
      <div style="font-size:0.95rem;font-weight:700;color:#1a3a5c">UNION EMS MEDICAL DIRECTOR</div>
      <div style="font-size:0.85rem;font-weight:600;color:#334155">SERVICE DOCUMENTATION REPORT</div>
      <div style="font-size:0.78rem;color:#64748b;margin-top:6px;line-height:1.8">
        <strong>Period:</strong> ${mfull}<br>
        <strong>Name:</strong> Matthew Bidwell, MD, MPH
      </div>
    </div>
    <table class="report-table">
      <thead><tr><th>Description of Services (Schedule B-1)</th><th>Est. Hours</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td>TOTAL HOURS</td><td>${totalHrs.toFixed(2)}</td></tr></tbody>
    </table>
    ${notesHTML}
    <div class="sig-block">
      <p style="font-size:0.77rem;color:#475569;margin-bottom:14px">I CERTIFY THAT THE ABOVE NUMBER OF HOURS IS AN ACCURATE REFLECTION OF THE TIME SPENT ON MY MEDICAL DIRECTOR DUTIES.</p>
      <div class="sig-grid">
        <div><div style="margin-bottom:22px"></div><div class="sig-line">Signature</div></div>
        <div><div style="margin-bottom:22px"></div><div class="sig-line">Date</div></div>
      </div>
      <div style="margin-top:14px;font-size:0.73rem;color:#64748b;line-height:1.8">
        Matthew Bidwell, MD, MPH<br>Union EMS Medical Director<br>Union County EMS · Monroe, NC
      </div>
    </div>`;
}

// ── PRINT ─────────────────────────────────────────────────────────────────
async function printReport() {
  const cur = document.getElementById('report-month').value;
  const { hrs, totalHrs, withNotes } = await getReportData(cur);
  const mfull = mlabel(cur);
  const rows = SCHEDULE.map(s => {
    if (s.subs.length) {
      const gTotal = s.subs.reduce((sum, sub) => sum + (hrs[sub] || 0), 0);
      return `<tr style="background:#eef2f7"><td><b>${s.group}</b></td><td align="right"><b>${gTotal > 0 ? gTotal.toFixed(2) : '—'}</b></td></tr>`
        + s.subs.map(sub => `<tr><td style="padding-left:20px">${sub}</td><td align="right">${(hrs[sub]||0)>0?(hrs[sub]).toFixed(2):'—'}</td></tr>`).join('');
    }
    return `<tr style="background:#eef2f7"><td><b>${s.group}</b></td><td align="right"><b>${(hrs[s.group]||0)>0?(hrs[s.group]).toFixed(2):'—'}</b></td></tr>`;
  }).join('');

// ── WORD EXPORT ───────────────────────────────────────────────────────────
async function exportWord() {
  const cur = document.getElementById('report-month').value;
  const { hrs, totalHrs, withNotes } = await getReportData(cur);
  const mfull = mlabel(cur);
  let tableRows = `<tr style="background:#1a3a5c;color:white"><td><b>Description of Services (Schedule B-1)</b></td><td><b>Est. Hours for Period</b></td></tr>`;
  SCHEDULE.forEach(s => {
    if (s.subs.length) {
      const gTotal = s.subs.reduce((sum, sub) => sum + (hrs[sub]||0), 0);
      tableRows += `<tr style="background:#eef2f7"><td><b>${s.group}</b></td><td align="right"><b>${gTotal>0?gTotal.toFixed(2):'—'}</b></td></tr>`;
      s.subs.forEach(sub => { tableRows += `<tr><td style="padding-left:20px">${sub}</td><td align="right">${(hrs[sub]||0)>0?(hrs[sub]).toFixed(2):'—'}</td></tr>`; });
    } else {
      tableRows += `<tr style="background:#eef2f7"><td><b>${s.group}</b></td><td align="right"><b>${(hrs[s.group]||0)>0?(hrs[s.group]).toFixed(2):'—'}</b></td></tr>`;
    }
  });
  tableRows += `<tr style="background:#1a3a5c;color:white"><td><b>TOTAL HOURS</b></td><td align="right"><b>${totalHrs.toFixed(2)}</b></td></tr>`;
  let notesSection = '';
  if (withNotes.length) {
    notesSection = `<p><b>Activity Notes</b></p>` + withNotes.map(e =>
      `<p style="padding-left:12px;border-left:3px solid #ccc;margin:4px 0"><b>${new Date(String(e.date)+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})} — ${e.category}:</b> ${e.notes}</p>`
    ).join('');
  }
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>Service Documentation Report</title>
<style>body{font-family:Arial,sans-serif;font-size:11pt;margin:1in}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:5px 8px;font-size:10pt}h2{color:#1a3a5c;margin-bottom:2px}h3{color:#1a3a5c;margin-top:2px;margin-bottom:10px}p{margin:6px 0}</style></head>
<body>
<h2>UNION EMS MEDICAL DIRECTOR</h2>
<h3>SERVICE DOCUMENTATION REPORT</h3>
<p><b>Period:</b> ${mfull}</p>
<p><b>Name:</b> Matthew Bidwell, MD, MPH</p>
<br><table>${tableRows}</table><br>
${notesSection}
<p>I CERTIFY THAT THE ABOVE NUMBER OF HOURS IS AN ACCURATE REFLECTION OF THE TIME SPENT ON MY MEDICAL DIRECTOR DUTIES.</p>
<br><br><br>
<table style="border:none;width:100%"><tr>
  <td style="border:none;border-top:1px solid #333;width:60%">Signature</td>
  <td style="border:none;width:30px"></td>
  <td style="border:none;border-top:1px solid #333">Date</td>
</tr></table>
<br>
<p style="font-size:9pt;color:#555">Matthew Bidwell, MD, MPH</p>
<p style="font-size:9pt;color:#555">Union EMS Medical Director</p>
<p style="font-size:9pt;color:#555">Union County EMS &middot; Monroe, NC</p>
</body></html>`;
  const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `Union_EMS_Report_${cur}.doc`; a.click();
  URL.revokeObjectURL(url);
  toast('✓ Word document downloaded!');
}

// ── TABS ──────────────────────────────────────────────────────────────────
function showTab(name) {
  ['log','entries','report'].forEach(t => document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none');
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['log','entries','report'][i] === name));
  if (name === 'entries') renderEntries();
  if (name === 'report') renderReport();
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg, bg = '#16a34a') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = bg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────
